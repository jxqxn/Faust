<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Faust 主桌面页 UI 校对稿</title>
  <style>
    :root {
      --bg: #0f0b09;
      --panel: #211914;
      --panel-2: #30251d;
      --gold: #d5b56f;
      --gold-bright: #ead08a;
      --text: #eadfcb;
      --muted: #aa987d;
      --danger: #a83137;
      --blue-sudan: #8ea5c8;
      --green: #8aa765;
      --card-w: 116px;
      --card-h: 178px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #151515;
      color: var(--text);
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    .frame {
      width: min(1280px, 100vw);
      aspect-ratio: 16 / 9;
      min-height: 640px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 38%, rgba(210, 167, 77, .08), transparent 24%),
        linear-gradient(180deg, rgba(0, 0, 0, .50), rgba(0, 0, 0, .12) 28%, rgba(0, 0, 0, .65) 100%),
        repeating-linear-gradient(35deg, rgba(166, 52, 28, .10) 0 16px, rgba(70, 25, 16, .10) 16px 32px),
        #6b2118;
      border: 1px solid #3c332a;
    }

    .hud {
      position: absolute;
      left: 22px;
      top: 18px;
      right: 22px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 0 18px;
      border: 1px solid rgba(213, 181, 111, .45);
      background: rgba(21, 15, 12, .82);
      border-radius: 6px;
      color: var(--gold-bright);
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0;
    }

    .hud .spacer {
      flex: 1;
    }

    .map {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 78px;
      bottom: 238px;
      border: 1px solid rgba(213, 181, 111, .25);
      background:
        radial-gradient(circle at 34% 30%, rgba(30, 85, 78, .35), transparent 10%),
        radial-gradient(circle at 65% 55%, rgba(18, 67, 75, .30), transparent 12%),
        linear-gradient(180deg, rgba(120, 34, 24, .58), rgba(71, 26, 20, .72));
      box-shadow: inset 0 0 90px rgba(0, 0, 0, .55);
      overflow: hidden;
    }

    .map::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .55;
      background:
        radial-gradient(circle at 17% 45%, transparent 0 7px, rgba(229, 211, 140, .45) 8px 10px, transparent 11px),
        radial-gradient(circle at 38% 22%, transparent 0 7px, rgba(229, 211, 140, .35) 8px 10px, transparent 11px),
        radial-gradient(circle at 62% 63%, transparent 0 7px, rgba(229, 211, 140, .35) 8px 10px, transparent 11px);
    }

    .site {
      position: absolute;
      min-width: 98px;
      padding: 7px 10px;
      border: 1px solid rgba(213, 181, 111, .55);
      background: rgba(12, 10, 8, .55);
      color: #e8d28b;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .site.home { left: 11%; top: 42%; }
    .site.market { left: 33%; top: 27%; }
    .site.palace { left: 48%; top: 41%; }
    .site.temple { left: 63%; top: 24%; }
    .site.wild { left: 73%; top: 63%; }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 12px 22px;
      background: rgba(16, 11, 9, .86);
      border: 1px solid rgba(213, 181, 111, .45);
      color: var(--gold-bright);
      font-size: 18px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .right-actions {
      position: absolute;
      right: 28px;
      bottom: 26px;
      width: 132px;
      display: grid;
      gap: 12px;
      z-index: 3;
    }

    .round-button {
      height: 132px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, #302718 0 45%, #15100c 46% 70%, #69532d 71% 100%);
      border: 4px solid #b99445;
      color: #f2d98d;
      font-size: 26px;
      font-weight: 900;
      box-shadow: 0 0 0 4px rgba(0, 0, 0, .35), 0 8px 20px rgba(0, 0, 0, .45);
    }

    .small-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .icon-button {
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(213, 181, 111, .65);
      background: rgba(20, 14, 11, .82);
      color: var(--gold-bright);
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .card-rail {
      position: absolute;
      left: 180px;
      right: 180px;
      bottom: 20px;
      height: 202px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 10px 16px 8px;
      overflow-x: auto;
      background: linear-gradient(180deg, rgba(17, 13, 11, .15), rgba(17, 13, 11, .86) 34%);
      border-top: 1px solid rgba(213, 181, 111, .30);
      scrollbar-color: #a98243 #17120f;
    }

    .rail-label {
      position: absolute;
      left: 28px;
      bottom: 28px;
      width: 116px;
      color: var(--gold-bright);
      font-size: 14px;
      line-height: 1.6;
    }

    .rank-tabs {
      display: grid;
      gap: 4px;
      margin-top: 8px;
      color: #f0d58c;
    }

    .rank-tabs span {
      display: block;
      width: 34px;
      padding: 3px 0;
      border: 1px solid rgba(213, 181, 111, .4);
      text-align: center;
      background: rgba(10, 8, 7, .72);
    }

    .card {
      flex: 0 0 var(--card-w);
      width: var(--card-w);
      height: var(--card-h);
      position: relative;
      border-radius: 8px;
      border: 2px solid rgba(230, 196, 114, .82);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .14), transparent 18%),
        linear-gradient(135deg, #5f6f48, #15110f 72%);
      box-shadow: 0 10px 18px rgba(0, 0, 0, .45);
      overflow: hidden;
      padding: 9px 8px;
    }

    .card.sudan {
      border-color: #dfe8ff;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .22), transparent 18%),
        linear-gradient(135deg, #b8c9e6, #24314b 72%);
      transform: translateY(-10px);
    }

    .card .name {
      font-size: 18px;
      font-weight: 900;
      color: #0e0c09;
      text-shadow: 0 1px rgba(255, 255, 255, .45);
    }

    .card:not(.sudan) .name {
      color: #22190f;
    }

    .card .portrait {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 42px;
      bottom: 34px;
      border-radius: 5px;
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 231, 160, .42), transparent 22%),
        linear-gradient(160deg, rgba(40, 83, 66, .72), rgba(14, 10, 9, .92));
      border: 1px solid rgba(0, 0, 0, .45);
    }

    .card.sudan .portrait {
      background:
        radial-gradient(circle at 55% 35%, rgba(255, 255, 255, .48), transparent 21%),
        linear-gradient(160deg, rgba(142, 165, 200, .86), rgba(20, 22, 40, .96));
    }

    .meta {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #f8e4a4;
      font-size: 12px;
      font-weight: 800;
    }

    .deadline {
      position: absolute;
      right: 7px;
      top: 7px;
      min-width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--danger);
      color: #fff1e8;
      border: 1px solid rgba(255, 255, 255, .65);
      font-size: 13px;
      font-weight: 900;
    }

    .callout {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 236px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="主桌面页目标布局校对稿">
    <section class="hud" aria-label="顶部轻 HUD">
      <span>第 1 回合 · 第 1 天</span>
      <span>金币 0</span>
      <span>金骰 3</span>
      <span>重抽 3</span>
      <span class="spacer"></span>
      <span>菜单</span>
    </section>

    <section class="map" aria-label="主桌面/地图区域">
      <div class="site home">治理家业</div>
      <div class="site market">商业区</div>
      <div class="site palace">宫廷</div>
      <div class="site temple">神殿区</div>
      <div class="site wild">野外</div>
      <div class="toast">事件提示 / 当前选择说明显示在桌面上，不单独占一个大日志面板</div>
    </section>

    <aside class="right-actions" aria-label="右侧行动按钮">
      <div class="round-button">下一天</div>
      <div class="small-actions">
        <div class="icon-button">仪</div>
        <div class="icon-button">抽</div>
      </div>
    </aside>

    <aside class="rail-label" aria-label="卡牌栏辅助信息">
      <div>统一卡牌栏</div>
      <div class="rank-tabs">
        <span>I</span>
        <span>II</span>
        <span>III</span>
        <span>IV</span>
      </div>
    </aside>

    <section class="card-rail" aria-label="底部统一卡牌栏">
      <article class="card sudan" aria-label="苏丹卡">
        <div class="deadline">7</div>
        <div class="name">纵欲</div>
        <div class="portrait"></div>
        <div class="meta"><span>苏丹卡</span><span>白银</span></div>
      </article>
      <article class="card"><div class="name">苏丹</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●●</span></div></article>
      <article class="card"><div class="name">税吏</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●</span></div></article>
      <article class="card"><div class="name">书记官</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●</span></div></article>
      <article class="card"><div class="name">维齐尔</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●●</span></div></article>
      <article class="card"><div class="name">武士</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●</span></div></article>
      <article class="card"><div class="name">禁卫</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●●</span></div></article>
      <article class="card"><div class="name">将军</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●●●</span></div></article>
      <article class="card"><div class="name">女奴</div><div class="portrait"></div><div class="meta"><span>角色</span><span>●</span></div></article>
    </section>

    <div class="callout">校对重点：苏丹卡与普通卡同在底部卡牌栏；“下一天”和手牌并排属于底部操作带；顶部只保留资源 HUD；中部恢复主桌面/地图语义。</div>
  </main>
</body>
</html>
